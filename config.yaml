    - "Madrid/Madring is scheduled as the Spanish Grand Prix venue in September, so a July social video about Madring is not evidence that SF-26 has just made its race debut there."
    - "Treat calendar-change claims such as Bahrain returning or double races at Baku/Singapore as speculative unless current evidence explicitly reports an official change."
